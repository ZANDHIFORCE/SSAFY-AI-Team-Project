services:
  - type: web
    name: localhub-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: DATABASE_URL
        value: sqlite:///./localhub.db
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
